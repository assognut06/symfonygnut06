name: Deploy to Production Server

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Prod Server
    runs-on: ubuntu-latest

    # Ne déployer que si la PR est mergée
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create incremental production tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG=$(git tag -l 'prod-v*' | sed -n 's/^prod-v\([0-9][0-9]*\)$/\1/p' | sort -n | tail -1)
          if [ -z "${LAST_TAG:-}" ]; then
            NEXT_NUMBER=1
          else
            NEXT_NUMBER=$((LAST_TAG + 1))
          fi

          NEW_TAG="prod-v${NEXT_NUMBER}"
          TARGET_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          if [ -z "$TARGET_SHA" ]; then
            echo "merge_commit_sha is empty, fallback to github.sha"
            TARGET_SHA="${{ github.sha }}"
          fi

          echo "Creating tag ${NEW_TAG} on commit ${TARGET_SHA}"
          git tag -a "$NEW_TAG" "$TARGET_SHA" -m "Production release ${NEW_TAG}"
          git push origin "$NEW_TAG"

          echo "tag_name=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Notify Teams - Deployment started
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag_name }}
        run: |
          set -euo pipefail

          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL is not set, skipping Teams start notification."
            exit 0
          fi

          curl -sS -H "Content-Type: application/json" -d "{\"text\":\"🚀 Deploy PROD started - tag ${RELEASE_TAG} - repo ${{ github.repository }} - run #${{ github.run_number }}\"}" "$TEAMS_WEBHOOK_URL"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT || 22 }}
          envs: GITHUB_TOKEN,RELEASE_TAG
          script: |
            set -e
            echo "🚀 Starting deployment to production server..."

            # Aller dans le répertoire du projet
            cd /var/www/gnut06_prod
            echo "📁 Current directory: $(pwd)"

            # Configurer l'accès GitHub
            echo "🔑 Setting up GitHub access..."
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts || true

            # Configurer Git avec le token pour l'authentification
            if [ ! -z "$GITHUB_TOKEN" ]; then
              echo "🔑 Configuring Git with GitHub token..."

              # Récupérer l'URL actuelle et la convertir en HTTPS
              CURRENT_URL=$(git remote get-url origin)
              echo "📍 Current remote URL: $CURRENT_URL"

              if [[ $CURRENT_URL == git@github.com:* ]]; then
                # Convertir SSH vers HTTPS
                HTTPS_URL=$(echo $CURRENT_URL | sed 's/git@github.com:/https:\/\/'"${GITHUB_TOKEN}"'@github.com\//')
                echo "🔄 Converting SSH URL to HTTPS..."
                git remote set-url origin "$HTTPS_URL"
              elif [[ $CURRENT_URL == https://github.com/* ]]; then
                # Ajouter le token à l'URL HTTPS existante
                HTTPS_URL=$(echo $CURRENT_URL | sed 's/https:\/\/github.com\//https:\/\/'"${GITHUB_TOKEN}"'@github.com\//')
                echo "🔄 Adding token to HTTPS URL..."
                git remote set-url origin "$HTTPS_URL"
              fi

              echo "✅ Remote URL configured for token authentication"
            fi

            # Récupérer les dernières modifications
            echo "📥 Pulling latest changes..."
            git fetch origin --tags
            git checkout "$RELEASE_TAG"
            echo "🏷️ Deploying tag: $RELEASE_TAG"

            # Aller dans le dossier app
            cd app
            echo "📁 Switched to app directory: $(pwd)"

            # Installer/mettre à jour les dépendances PHP
            echo "📦 Installing/updating PHP dependencies..."
            composer install --no-dev --optimize-autoloader

            # Régénérer l'autoloader après suppression des packages dev
            echo "🔄 Optimizing autoloader for production..."
            composer dump-autoload --optimize --classmap-authoritative

            # Exécuter les migrations
            echo "🗄️ Running database migrations..."
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod

            # Installer/mettre à jour les dépendances Node.js
            echo "📦 Installing/updating Node.js dependencies..."
            npm install

            # Générer les assets
            echo "🎨 Building assets..."
            npm run build

            # Vider le cache Symfony
            echo "🧹 Clearing Symfony cache..."
            sudo chown -R www-data:www-data /var/www/gnut06_prod/app/var
            sudo -u www-data php bin/console cache:clear --env=prod --no-debug

            # Réchauffer le cache
            echo "🔥 Warming up cache..."
            sudo -u www-data php bin/console cache:warmup --env=prod --no-debug

            echo "✅ Deployment completed successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag_name }}

      - name: Notify Teams - Deployment finished
        if: always()
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag_name }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL is not set, skipping Teams end notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="❌"
          fi

          curl -sS -H "Content-Type: application/json" -d "{\"text\":\"${STATUS_ICON} Deploy PROD finished - status ${JOB_STATUS} - tag ${RELEASE_TAG} - repo ${{ github.repository }} - run #${{ github.run_number }}\"}" "$TEAMS_WEBHOOK_URL"
