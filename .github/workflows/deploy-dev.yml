name: Deploy to Development Server

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Dev Server
    runs-on: ubuntu-latest

    # Ne déployer que si la PR est mergée
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true

    steps:
      - name: Notify Teams - Deployment started
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL is not set, skipping Teams early start notification."
            exit 0
          fi

          MESSAGE="🚀 Deploy DEV started - repo ${{ github.repository }} - run #${{ github.run_number }}"
          PAYLOAD=$(printf '{"type":"AdaptiveCard","$schema":"http://adaptivecards.io/schemas/adaptive-card.json","version":"1.4","body":[{"type":"TextBlock","text":"%s","wrap":true,"size":"Large","weight":"Bolder"}]}' "$MESSAGE")

          HTTP_CODE=$(curl -sS -o /tmp/notify_start_response.txt -w "%{http_code}" -H "Content-Type: application/json" -d "$PAYLOAD" "$TEAMS_WEBHOOK_URL" || true)
          echo "Notify start HTTP status: ${HTTP_CODE}"
          if [[ ! "$HTTP_CODE" =~ ^[0-9]{3}$ ]] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Notify start failed. Response body:"
            cat /tmp/notify_start_response.txt || true
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT || 22 }}
          envs: GITHUB_TOKEN,DEPLOY_BRANCH
          script: |
            set -euo pipefail

            PROJECT_DIR="/var/www/html/gnut06_dev"
            APP_DIR="${PROJECT_DIR}/app"
            APPENV=prod
            REQUIRED_NPM_VERSION="11.2.0"
            export APP_ENV="$APPENV"
            export APP_DEBUG="${APP_DEBUG:-0}"

            has_sudo() {
              [ "$(id -u)" -eq 0 ] || sudo -n true 2>/dev/null
            }

            run_sudo() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
              elif sudo -n true 2>/dev/null; then
                sudo "$@"
              else
                echo "❌ Sudo unavailable. Configure passwordless sudo for $(whoami) if this command must run as root."
                exit 1
              fi
            }

            run_as_www_data() {
              if [ "$(id -u)" -eq 0 ]; then
                sudo -u www-data "$@"
              elif sudo -n true 2>/dev/null; then
                sudo -u www-data "$@"
              else
                echo "⚠️ Sudo unavailable; running command as $(whoami) instead of www-data."
                "$@"
              fi
            }

            version_at_least() {
              [ "$(printf '%s\n%s\n' "$2" "$1" | sort -V | head -n 1)" = "$2" ]
            }

            ensure_npm_cli() {
              CURRENT_NPM_VERSION="$(npm --version 2>/dev/null || true)"
              if [ -z "$CURRENT_NPM_VERSION" ]; then
                echo "❌ npm is not available on the server."
                exit 1
              fi

              if version_at_least "$CURRENT_NPM_VERSION" "$REQUIRED_NPM_VERSION"; then
                USE_NPX_NPM=0
                echo "✅ Using npm ${CURRENT_NPM_VERSION}."
              else
                if ! command -v npx >/dev/null 2>&1; then
                  echo "❌ npm ${CURRENT_NPM_VERSION} is below ${REQUIRED_NPM_VERSION}, and npx is not available."
                  exit 1
                fi
                USE_NPX_NPM=1
                echo "⬆️ Server npm ${CURRENT_NPM_VERSION} is below ${REQUIRED_NPM_VERSION}; using npm@${REQUIRED_NPM_VERSION} with npx."
              fi
            }

            npm_exec() {
              if [ "${USE_NPX_NPM:-0}" = "1" ]; then
                npx -y -p "npm@${REQUIRED_NPM_VERSION}" npm "$@"
              else
                npm "$@"
              fi
            }

            echo "🚀 Starting deployment to development server..."

            # Aller dans le répertoire du projet
            cd "$PROJECT_DIR"
            echo "📁 Current directory: $(pwd)"

            # Fix permissions on entire project directory
            echo "🔧 Fixing project directory permissions..."
            if has_sudo; then
              run_sudo chown -R "$(whoami):$(whoami)" "$PROJECT_DIR"
            else
              echo "⚠️ Sudo unavailable; skipping project chown."
            fi

            # Éviter l'erreur "detected dubious ownership" sur ce dépôt
            git config --global --add safe.directory "$PROJECT_DIR"

            # Configurer l'accès GitHub
            echo "🔑 Setting up GitHub access..."
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts || true

            # Configurer Git avec le token pour l'authentification
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              echo "🔑 Configuring Git with GitHub token..."
              CURRENT_URL=$(git remote get-url origin)
              echo "📍 Current remote URL: $CURRENT_URL"
              echo "✅ Will use temporary authenticated git config (no remote rewrite)"
            fi

            # Récupérer les dernières modifications
            echo "📥 Pulling latest changes..."
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git \
                -c "url.https://${GITHUB_TOKEN}@github.com/.insteadOf=git@github.com:" \
                -c "url.https://${GITHUB_TOKEN}@github.com/.insteadOf=https://github.com/" \
                fetch origin "$DEPLOY_BRANCH"
            else
              git fetch origin "$DEPLOY_BRANCH"
            fi
            # The deploy working tree must exactly match the remote branch.
            # Using checkout/reset handles forced updates and discarded local deploy-only commits
            # without failing on divergent history like `git pull --ff-only` does.
            git checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            echo "🌿 Deploying branch: $DEPLOY_BRANCH"

            # Aller dans le dossier app
            cd "$APP_DIR"
            echo "📁 Switched to app directory: $(pwd)"

            # Installer/mettre à jour les dépendances PHP
            echo "📦 Installing/updating PHP dependencies..."
            composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

            # Régénérer l'autoloader pour l'environnement Symfony
            echo "🔄 Optimizing autoloader for Symfony ${APPENV} environment..."
            composer dump-autoload --no-dev --optimize --classmap-authoritative

            # Exécuter les migrations
            echo "🗄️ Running database migrations..."
            php bin/console doctrine:migrations:migrate --no-interaction --env="$APPENV"

            # Installer/mettre à jour les dépendances Node.js
            echo "📦 Installing/updating Node.js dependencies..."
            ensure_npm_cli
            npm_exec ci --include=dev

            # Générer les assets
            echo "🎨 Building assets..."
            npm_exec run build

            # Vider le cache Symfony
            echo "🧹 Clearing Symfony cache..."
            run_as_www_data env APP_ENV="$APPENV" APP_DEBUG="$APP_DEBUG" php bin/console cache:clear --env="$APPENV" --no-debug

            # Réchauffer le cache
            echo "🔥 Warming up cache..."
            run_as_www_data env APP_ENV="$APPENV" APP_DEBUG="$APP_DEBUG" php bin/console cache:warmup --env="$APPENV" --no-debug

            echo "✅ Deployment completed successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_BRANCH: develop

      - name: Notify Teams - Deployment finished
        if: always()
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL is not set, skipping Teams end notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="❌"
          fi

          MESSAGE="${STATUS_ICON} Deploy DEV finished - status ${JOB_STATUS} - repo ${{ github.repository }} - run #${{ github.run_number }}"
          PAYLOAD=$(printf '{"type":"AdaptiveCard","$schema":"http://adaptivecards.io/schemas/adaptive-card.json","version":"1.4","body":[{"type":"TextBlock","text":"%s","wrap":true,"size":"Large","weight":"Bolder"}]}' "$MESSAGE")

          HTTP_CODE=$(curl -sS -o /tmp/notify_end_response.txt -w "%{http_code}" -H "Content-Type: application/json" -d "$PAYLOAD" "$TEAMS_WEBHOOK_URL" || true)
          echo "Notify finished HTTP status: ${HTTP_CODE}"
          if [[ ! "$HTTP_CODE" =~ ^[0-9]{3}$ ]] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Notify finished failed. Response body:"
            cat /tmp/notify_end_response.txt || true
          fi
