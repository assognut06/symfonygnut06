name: Branch up to date

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop
      - main
      - master
      - test-retard-branche

  push:
    branches:
      - develop
      - main
      - master

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: branch-up-to-date-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  check-pr:
    name: Branch up to date
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if PR is behind base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          git fetch origin "$BASE_REF"

          BEHIND=$(git rev-list --count "HEAD..origin/${BASE_REF}")
          AHEAD=$(git rev-list --count "origin/${BASE_REF}..HEAD")

          echo "Base: origin/${BASE_REF}"
          echo "PR head is ahead by ${AHEAD} commit(s), behind by ${BEHIND} commit(s)"

          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::This branch is ${BEHIND} commit(s) behind '${BASE_REF}'. Rebase or merge '${BASE_REF}' into this branch, then push again."
            exit 1
          fi

          echo "Branch is up to date with ${BASE_REF}."

  recheck-open-prs:
    name: Recheck open PRs after base update
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark outdated open PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = context.ref.replace(/^refs\/heads\//, '');
            const checkName = 'Branch up to date';

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base,
              per_page: 100,
            });

            core.info(`Found ${prs.length} open PR(s) targeting ${base}`);

            for (const pr of prs) {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${base}...${pr.head.sha}`,
              });

              const behindBy = comparison.data.behind_by ?? 0;
              const aheadBy = comparison.data.ahead_by ?? 0;
              const isBehind = behindBy > 0;
              const conclusion = isBehind ? 'failure' : 'success';
              const title = isBehind
                ? `Behind ${base} by ${behindBy} commit(s)`
                : `Up to date with ${base}`;
              const summary = isBehind
                ? `This branch is **${behindBy}** commit(s) behind \`${base}\` (and ${aheadBy} ahead).\n\n` +
                  `Rebase or merge \`${base}\` into \`${pr.head.ref}\`, then push again.`
                : `This branch is up to date with \`${base}\` (${aheadBy} commit(s) ahead).`;

              await github.rest.checks.create({
                owner,
                repo,
                name: checkName,
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion,
                output: {
                  title,
                  summary,
                },
              });

              core.info(`PR #${pr.number}: ${title}`);
            }
