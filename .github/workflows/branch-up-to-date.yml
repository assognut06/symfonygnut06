name: Branch up to date with main

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop
      - main
      - feature/retard-branches
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: branch-up-to-date-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  check-pr:
    name: Up to date with main
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Checkout the PR head tip — NOT the synthetic merge commit.
      # On pull_request, the default checkout merges the base into HEAD, which
      # hides lag vs main (especially when the PR targets main or an up-to-date develop).
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fail if PR branch is behind main
        env:
          PR_BASE: ${{ github.base_ref }}
          PR_HEAD: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          git fetch origin main

          BEHIND=$(git rev-list --count "HEAD..origin/main")
          AHEAD=$(git rev-list --count "origin/main..HEAD")

          echo "PR branch: ${PR_HEAD}"
          echo "PR targets: ${PR_BASE}"
          echo "Compared to: origin/main"
          echo "Checked out SHA: $(git rev-parse HEAD)"
          echo "PR head is ahead by ${AHEAD} commit(s), behind by ${BEHIND} commit(s)"

          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::Branch '${PR_HEAD}' is ${BEHIND} commit(s) behind 'main'. Merge or rebase 'main' into this branch, then push again (even if the PR targets '${PR_BASE}')."
            exit 1
          fi

          echo "Branch is up to date with main."

  recheck-open-prs:
    name: Recheck open PRs after main update
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark PRs behind main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reference = 'main';
            const checkName = 'Up to date with main';
            const targetBases = ['main', 'develop'];

            const prs = [];
            for (const base of targetBases) {
              const page = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                base,
                per_page: 100,
              });
              prs.push(...page);
            }

            core.info(`Found ${prs.length} open PR(s) targeting main or develop`);

            for (const pr of prs) {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${reference}...${pr.head.sha}`,
              });

              const behindBy = comparison.data.behind_by ?? 0;
              const aheadBy = comparison.data.ahead_by ?? 0;
              const isBehind = behindBy > 0;
              const conclusion = isBehind ? 'failure' : 'success';
              const title = isBehind
                ? `Behind main by ${behindBy} commit(s)`
                : 'Up to date with main';
              const summary = isBehind
                ? `This branch is **${behindBy}** commit(s) behind \`main\` (and ${aheadBy} ahead).\n\n` +
                  `PR target: \`${pr.base.ref}\`.\n\n` +
                  `Merge or rebase \`main\` into \`${pr.head.ref}\`, then push again.`
                : `This branch is up to date with \`main\` (${aheadBy} commit(s) ahead). PR target: \`${pr.base.ref}\`.`;

              await github.rest.checks.create({
                owner,
                repo,
                name: checkName,
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion,
                output: {
                  title,
                  summary,
                },
              });

              core.info(`PR #${pr.number} (→ ${pr.base.ref}): ${title}`);
            }
