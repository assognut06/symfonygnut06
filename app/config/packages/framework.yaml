# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    mailer:
        dsn: '%env(MAILER_DSN)%'
    secret: '%env(APP_SECRET)%'
    trusted_hosts: ['^(?:.+\.)?gnut06\.org$', '^localhost$', '^127\.0\.0\.1$']
    #csrf_protection: true
    
    # Configuration des headers de sécurité
    http_method_override: false

    # Clients HTTP scopés (remplacent l'instanciation manuelle de GuzzleHttp\Client)
    http_client:
        scoped_clients:
            helloasso.client:
                base_uri: 'https://api.helloasso.com'
            ohme.client:
                base_uri: 'https://api-ohme.oneheart.fr/api/v1/'
                headers:
                    client-name: '%app.slug_asso%'
                    client-secret: '%ohme.api_key%'

    # Note that the session will be started ONLY if you read or write from it.
    #session: true
    session:
        handler_id: null
        cookie_secure: 'auto'
        cookie_samesite: 'lax'
    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
