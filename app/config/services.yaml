# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    helloasso.api_client_id: '%env(APICLIENTID)%'
    helloasso.api_client_secret: '%env(APICLIENTSECRET)%'
    app.slug_asso: '%env(SLUGASSO)%'
    app.google_maps_api_key: '%env(GNUT06MAPAPI)%'
    mailjet.api_key: '%env(APIMAILJET)%'
    mailjet.api_secret: '%env(APIMAILJETSECRET)%'
    ohme.api_key: '%env(SECRETOHME)%'
    app.email.admin: 'gnut@gnut06.org'
    app.email.from: '%env(default:app.email.admin:SMTP_EMAIL)%'
    parameters:
    photos_directory: '%kernel.project_dir%/public/uploads/profilePictures'
    bordereau_directory: '%kernel.project_dir%/public/uploads/bordereau'
    nocaptcha.secret: '%env(NOCAPTCHA_SECRET)%'
    nocaptcha.sitekey: '%env(NOCAPTCHA_SITEKEY)%'
    app.env: '%env(APP_ENV)%'
    oauth.azure_client_id: '%env(default::AZURE_CLIENT_ID)%'
    oauth.google_client_id: '%env(default::GOOGLE_CLIENT_ID)%'
    cv_tih_directory: '%kernel.project_dir%/public/uploads/tihcv'
    attestation_tih_directory: '%kernel.project_dir%/public/uploads/tihattest'
    helloasso.webhook.default_allowed_ips: '51.138.206.200'
    helloasso.webhook.empty_secret: ''
    helloasso.webhook.default_signature_header: 'X-HelloAsso-Signature'
    helloasso.webhook.default_timestamp_header: 'X-HelloAsso-Timestamp'
    helloasso.webhook.allowed_ips: '%env(default:helloasso.webhook.default_allowed_ips:HELLOASSO_WEBHOOK_ALLOWED_IPS)%'
    helloasso.webhook.signature_secret: '%env(default:helloasso.webhook.empty_secret:HELLOASSO_WEBHOOK_SECRET)%'
    helloasso.webhook.signature_header: '%env(default:helloasso.webhook.default_signature_header:HELLOASSO_WEBHOOK_SIGNATURE_HEADER)%'
    helloasso.webhook.timestamp_header: '%env(default:helloasso.webhook.default_timestamp_header:HELLOASSO_WEBHOOK_TIMESTAMP_HEADER)%'
    helloasso.webhook.replay_ttl_seconds: 86400
    helloasso.webhook.timestamp_tolerance_seconds: 300
    helloasso.webhook.rate_limit_max_requests: 60
    helloasso.webhook.rate_limit_window_seconds: 60
    helloasso.webhook.max_payload_bytes: 1048576


services:
    App\MessageHandler\NotificationHandler:
        tags: [messenger.message_handler]
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $appEnv: '%app.env%'
            $slugAsso: '%app.slug_asso%'
            $googleMapsApiKey: '%app.google_maps_api_key%'
            $nocaptchaSecret: '%nocaptcha.secret%'
            $nocaptchaSiteKey: '%nocaptcha.sitekey%'
            $fromEmail: '%app.email.from%'
            $adminEmail: '%app.email.admin%'
            $azureClientId: '%oauth.azure_client_id%'
            $googleClientId: '%oauth.google_client_id%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Message/'
            - '../src/Application/DTO/'
            - '../src/Application/ViewModel/'
            - '../src/Application/Command/*Command.php'
            - '../src/Application/Query/*Query.php'

    # CQRS - Query Bus Configuration
    App\Application\Query\QueryBus:
        arguments:
            $handlers: !service_locator
                App\Application\Query\Tih\SearchTihQuery: '@App\Application\Query\Tih\SearchTihQueryHandler'
                App\Application\Query\Tih\GetAvailableFiltersQuery: '@App\Application\Query\Tih\GetAvailableFiltersQueryHandler'

    # CQRS - Command Bus Configuration
    App\Application\Command\CommandBus:
        arguments:
            $handlers: !service_locator
                App\Application\Command\Tih\SendTihContactCommand: '@App\Application\Command\Tih\SendTihContactCommandHandler'

    # TIH Email Service Configuration
    App\Service\TihEmailService:
        arguments:
            $fromEmail: '%app.email.from%'
            $adminEmail: '%app.email.admin%'
            $logoPath: '%kernel.project_dir%/public/images/logo_trans-min_300.png'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Service\TokenManager:
        arguments:
            $clientId: '%env(APICLIENTID)%'
            $clientSecret: '%env(APICLIENTSECRET)%'
            $urlToken: 'https://api.helloasso.com/oauth2/token'
            $slugAsso: '%app.slug_asso%'

    App\Service\HelloAssoAuthService:
        class: App\Service\HelloAssoAuthService
        arguments:
            - '@request_stack'
            - '%env(APICLIENTID)%'
            - '%env(APICLIENTSECRET)%'

    App\Service\HelloAssoApiService:
        class: App\Service\HelloAssoApiService
        arguments:
            $helloAssoAuthService: '@App\Service\HelloAssoAuthService'

    # Configuration spécifique pour votre service de pagination
    App\Service\PaginationService:
        class: App\Service\PaginationService
        arguments:
            $limit: 12 # Vous pouvez définir une valeur par défaut différente pour 'limit' ici si nécessaire

    App\Service\AssoRecommanderService:
        class: App\Service\AssoRecommanderService

    App\Service\DataFilterAndSortService:
        class: App\Service\DataFilterAndSortService

    App\Service\MailjetService:
        arguments:
            $apiKey: '%env(APIMAILJET)%'
            $apiSecret: '%env(APIMAILJETSECRET)%'

    App\Service\OhmeApiService:
        arguments:
            $slugAsso: '%app.slug_asso%'
            $secretOhme: '%env(SECRETOHME)%'

    App\Service\ApiFrameVrService:
        arguments:
            $apiKey: '%env(APIFRAMEVR)%'
        
    App\Service\RecaptchaVerifier:
        arguments:
            $client: '@http_client'
            $secretKey: '%nocaptcha.secret%'
            $appEnv: '%app.env%'
            $recaptchaSecret: '%nocaptcha.secret%'

    App\Controller\NotificationController:
        arguments:
            $cache: '@cache.app'
            $webhookAllowedIps: '%helloasso.webhook.allowed_ips%'
            $webhookSignatureSecret: '%helloasso.webhook.signature_secret%'
            $webhookSignatureHeader: '%helloasso.webhook.signature_header%'
            $webhookTimestampHeader: '%helloasso.webhook.timestamp_header%'
            $webhookReplayTtlSeconds: '%helloasso.webhook.replay_ttl_seconds%'
            $webhookTimestampToleranceSeconds: '%helloasso.webhook.timestamp_tolerance_seconds%'
            $webhookRateLimitMaxRequests: '%helloasso.webhook.rate_limit_max_requests%'
            $webhookRateLimitWindowSeconds: '%helloasso.webhook.rate_limit_window_seconds%'
            $webhookMaxPayloadBytes: '%helloasso.webhook.max_payload_bytes%'

    App\Service\EmailService: ~

    App\Service\GeocodeService:
        arguments:
            $googleMapsApiKey: '%app.google_maps_api_key%'

    App\Controller\RegistrationController:
        arguments:
            $recaptchaSecret: '%nocaptcha.secret%'
            $appEnv: '%app.env%'
